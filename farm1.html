<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BANANA FARM | Forest Rewards</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&family=Inter:wght@300;400;600&display=swap');

body {
    background: #d1f2e5; /* Hijau Mint Soft sesuai maskot */
    color: #1a3c34;
    font-family: 'Inter', sans-serif;
    overflow-x: hidden;
}

.font-fredoka { font-family: 'Fredoka', sans-serif; }

.glass-morphism {
    background: rgba(255, 255, 255, 0.8);
    backdrop-filter: blur(12px);
    border: 2px solid #2d6a4f;
    border-radius: 24px;
    transition: all .3s ease;
}

.gold-text {
    background: linear-gradient(to bottom, #2d6a4f, #1b4332);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.hero-gradient {
    background: radial-gradient(circle at center, #ffffff 0%, #d1f2e5 80%);
}

.apr-glow { text-shadow: 0 0 15px rgba(45, 106, 79, 0.3); }

.duration-btn.active {
    background: #2d6a4f !important;
    color: white !important;
    border-color: #1b4332 !important;
    box-shadow: 0 0 15px rgba(45, 106, 79, 0.4);
}

.tier-badge {
    background: white;
    border: 2px solid #2d6a4f;
    box-shadow: 0 4px 0 #2d6a4f;
}

/* Banana Rain (Sesuai Halaman Utama) */
.banana {
    position: fixed;
    top: -80px;
    font-size: 24px;
    opacity: .5;
    animation: fall linear infinite;
    z-index: -1;
}
@keyframes fall {
    0% { transform: translateY(-80px) rotate(0deg); opacity: 0; }
    10% { opacity: .5; }
    100% { transform: translateY(115vh) rotate(360deg); opacity: 0; }
}
</style>
</head>

<body class="hero-gradient min-h-screen">

<nav class="p-4 md:p-6">
    <div class="max-w-7xl mx-auto flex flex-row justify-between items-center glass-morphism px-4 py-3 md:px-6 md:py-4">
        <!-- Bagian Logo -->
        <a href="index.html" class="flex items-center space-x-2 md:space-x-3 transition-transform hover:scale-105 min-w-0">
            <img src="G.jpg" class="w-8 h-8 md:w-10 md:h-10 rounded-full border-2 border-[#2d6a4f] flex-shrink-0">
            <span class="font-fredoka text-lg md:text-2xl font-bold uppercase tracking-tight text-[#1b4332] truncate">
                BANANA<span class="text-[#2d6a4f]">APE</span>
            </span>
        </a>
        
        <!-- Bagian Tombol -->
        <div class="flex items-center gap-2 md:gap-3 flex-shrink-0">
            <img src="solana.PNG" alt="Solana" class="w-8 h-8 rounded-xl hidden sm:block flex-shrink-0">
            <button id="wallet-adapter-btn" onclick="handleWalletAction()"
                class="bg-[#2d6a4f] hover:bg-[#1b4332] px-3 py-2 md:px-6 md:py-2 rounded-xl font-fredoka text-[10px] md:text-[12px] border-b-4 border-[#1b4332] text-white font-bold uppercase transition-all shadow-lg whitespace-nowrap">
                Connect Wallet
            </button>
        </div>
    </div>
</nav>

<main class="max-w-4xl mx-auto px-4 pt-10 pb-20">
    <header class="text-center mb-12">
        <div class="inline-block bg-orange-100 text-orange-700 px-4 py-1 rounded-full text-xs font-bold mb-4 uppercase tracking-widest">
            🌲 Forest Farm Active
        </div>
        <h1 class="font-fredoka text-4xl md:text-6xl font-bold text-[#1b4332] mb-4 uppercase">Banana Farm</h1>
        <p class="text-[#2d6a4f] font-fredoka text-[10px] tracking-[0.3em] uppercase italic">
            Staking Status: <span class="text-green-600 font-bold">ONLINE</span>
        </p>
    </header>

    <div class="grid grid-cols-2 gap-4 mb-8 text-center">
        <div class="glass-morphism p-4 border-[#2d6a4f]/20">
            <p class="text-[9px] text-[#2d6a4f] uppercase font-fredoka font-bold">Total Value Locked</p>
            <p class="text-xl font-bold font-fredoka text-[#1b4332]">$<span id="tvl-stat">0</span></p>
        </div>
        <div class="glass-morphism p-4 border-[#2d6a4f]/20">
            <p class="text-[9px] text-[#2d6a4f] uppercase font-fredoka font-bold">Total Rewards Paid</p>
            <p class="text-xl font-bold font-fredoka text-green-600"><span id="rewards-paid-stat">0</span></p>
        </div>
    </div>

    <div class="mb-10 text-center">
        <div class="inline-block tier-badge px-8 py-3 rounded-2xl">
            <p class="text-[8px] font-fredoka text-[#2d6a4f] uppercase mb-1 tracking-[0.2em]">Your Gorilla Rank</p>
            <p class="text-sm font-bold font-fredoka text-[#1b4332] italic uppercase">
                <i class="fas fa-crown text-orange-500 mr-2"></i>
                RANK: <span id="gorilla-level">BABY APE</span>
            </p>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10 text-center">
        <div class="glass-morphism p-6 border-b-4 border-[#2d6a4f]">
            <p class="text-[10px] text-gray-500 uppercase font-fredoka mb-2 font-bold">Total Staked</p>
            <p class="text-2xl font-bold font-fredoka text-[#1b4332]"><span id="total-staked">0</span></p>
        </div>
        <div class="glass-morphism p-6 border-b-4 border-green-500">
            <p class="text-[10px] text-gray-500 uppercase font-fredoka mb-2 font-bold">Selected APR</p>
            <p class="text-2xl font-bold font-fredoka text-green-600 apr-glow" id="display-apr">80%</p>
        </div>
        <div class="glass-morphism p-6 border-b-4 border-orange-500">
            <p class="text-[10px] text-gray-500 uppercase font-fredoka mb-2 font-bold">Your Rewards</p>
            <p class="text-2xl font-bold font-fredoka text-orange-600"><span id="live-rewards">0</span></p>
        </div>
    </div>

    <div class="glass-morphism p-8 md:p-12 border-t-4 border-[#2d6a4f] bg-white/90">
        <div class="mb-10">
            <label class="text-[10px] font-fredoka text-gray-500 uppercase block mb-4 font-bold">1. Select Staking Duration</label>
            <div class="grid grid-cols-3 gap-3">
                <button onclick="setDuration(3,0.4,this)" class="duration-btn bg-green-50 border-2 border-[#2d6a4f]/20 py-4 text-[11px] font-fredoka font-bold rounded-xl transition-all">
                    3 Days <br><span class="text-green-600">40% APR</span>
                </button>
                <button onclick="setDuration(7,0.8,this)" class="duration-btn active bg-green-50 border-2 border-[#2d6a4f]/20 py-4 text-[11px] font-fredoka font-bold rounded-xl transition-all">
                    7 Days <br><span class="text-green-600">80% APR</span>
                </button>
                <button onclick="setDuration(30,1.6,this)" class="duration-btn bg-green-50 border-2 border-[#2d6a4f]/20 py-4 text-[11px] font-fredoka font-bold rounded-xl transition-all">
                    30 Days <br><span class="text-green-600">160% APR</span>
                </button>
            </div>
        </div>

        <div class="flex flex-col md:flex-row gap-8 items-end">
            <div class="w-full">
                <div class="flex justify-between mb-2 text-[10px] font-fredoka uppercase font-bold">
                    <label class="text-gray-500">2. Amount to Stake</label>
                    <span id="user-balance" class="text-[#2d6a4f]">Balance: 0 $BAPE</span>
                </div>
                <div class="relative">
                    <input type="number" id="stake-input" oninput="calculateReward()" placeholder="0.0"
                        class="w-full bg-white border-2 border-[#2d6a4f]/30 rounded-2xl px-6 py-4 text-[#1b4332] font-bold focus:border-[#2d6a4f] outline-none transition-all">
                    <button onclick="maxAmount()" class="absolute right-4 top-4 text-[11px] font-fredoka text-orange-600 font-bold uppercase">Max</button>
                </div>
                
                <div class="mt-6 flex gap-3">
                    <button onclick="executeAction('Harvest')" class="flex-1 bg-green-100 hover:bg-green-200 border-b-4 border-green-600 text-green-700 py-3 rounded-xl font-fredoka text-[11px] font-bold uppercase transition-all">
                        <i class="fas fa-seedling mr-2"></i> Harvest
                    </button>
                    <button onclick="executeAction('Compound')" class="flex-1 bg-blue-100 hover:bg-blue-200 border-b-4 border-blue-600 text-blue-700 py-3 rounded-xl font-fredoka text-[11px] font-bold uppercase transition-all">
                        <i class="fas fa-sync-alt mr-2"></i> Compound
                    </button>
                </div>
            </div>

            <button onclick="executeAction('Stake')"
                class="w-full md:w-48 bg-[#2d6a4f] py-5 rounded-2xl font-fredoka font-bold uppercase text-white border-b-4 border-[#1b4332] hover:scale-105 transition-all shadow-xl">
                Stake Now
            </button>
        </div>

        <div id="reward-display" class="mt-10 grid grid-cols-2 gap-4 hidden">
            <div class="bg-green-50 border border-[#2d6a4f]/20 p-4 rounded-xl text-center">
                <p class="text-[8px] text-gray-500 font-fredoka uppercase mb-1 font-bold">Daily Reward</p>
                <p class="text-sm font-bold font-fredoka text-green-600">+ <span id="daily-reward">0</span> $BAPE</p>
            </div>
            <div class="bg-orange-50 border border-orange-200 p-4 rounded-xl text-center">
                <p class="text-[8px] text-gray-500 font-fredoka uppercase mb-1 font-bold">Total Reward (<span id="calc-days">7</span>d)</p>
                <p class="text-sm font-bold font-fredoka text-orange-600">+ <span id="period-reward">0</span> $BAPE</p>
            </div>
        </div>
    </div>
</main>

<script>
// LOGIKA TETAP SAMA DARI KODINGAN AWALMU
const CONFIG = {
    ca: "AkgVdEH24cWSdzTf735SWESjsz4Y13m1u6AZcEmfpump",
    poolAddress: "BAPE IS LIVE AFTER MIGRATION",
    poolLink: "BAPE IS LIVE AFTER MIGRATION",
    rpc: "https://mainnet.helius-rpc.com/?api-key=066b5771-93f3-4f21-b935-c95d78335e30",
    estimatedPrice: 0.00001
};

let userWallet = null;
let userBalance = 0;
let currentAPR = 0.8;
let currentDays = 7;

const connection = new solanaWeb3.Connection(CONFIG.rpc, "confirmed");

async function handleWalletAction() {
    if (!window.solana || !window.solana.isPhantom) {
        window.open("https://phantom.app/", "_blank");
        return;
    }
    try {
        const resp = await window.solana.connect();
        userWallet = resp.publicKey.toString();
        document.getElementById("wallet-adapter-btn").innerText = userWallet.slice(0,4)+"..."+userWallet.slice(-4);
        document.getElementById("wallet-adapter-btn").classList.replace("bg-[#2d6a4f]", "bg-green-600");
        await fetchUserBalance();
        Swal.fire({ title: "Connected!", text: "Wallet linked to Forest Farm", icon: "success", background: "#ffffff", color: "#1a3c34" });
    } catch (e) { console.log(e); }
}

async function fetchUserBalance() {
    if (!userWallet) return;
    try {
        const owner = new solanaWeb3.PublicKey(userWallet);
        const mint = new solanaWeb3.PublicKey(CONFIG.ca);
        const res = await connection.getParsedTokenAccountsByOwner(owner, {mint: mint});
        userBalance = res.value.length > 0 ? res.value[0].account.data.parsed.info.tokenAmount.uiAmount : 0;
        document.getElementById("user-balance").innerText = "Balance: " + Number(userBalance).toLocaleString() + " $BAPE";
    } catch (err) { console.log(err); }
}

async function fetchBlockchainStats() {
    try {
        const owner = new solanaWeb3.PublicKey(CONFIG.poolAddress);
        const mint = new solanaWeb3.PublicKey(CONFIG.ca);
        const res = await connection.getParsedTokenAccountsByOwner(owner, {mint: mint});
        let amount = res.value.length > 0 ? res.value[0].account.data.parsed.info.tokenAmount.uiAmount : 0;
        document.getElementById("total-staked").innerText = Number(amount).toLocaleString();
        document.getElementById("tvl-stat").innerText = (Number(amount) * CONFIG.estimatedPrice).toLocaleString();
        document.getElementById("rewards-paid-stat").innerText = (Number(amount) * 0.05).toLocaleString();
    } catch (err) { console.log(err); }
}

function executeAction(action) {
    if (!userWallet) {
        Swal.fire({ title: "Connect Wallet", text: "Please connect wallet first", icon: "warning", background: "#ffffff", color: "#1a3c34" });
        return;
    }
    Swal.fire({
        title: action + " Process",
        text: "Redirecting to Streamflow Forest Pool...",
        icon: "info",
        showCancelButton: true,
        confirmButtonText: "Open App",
        background: "#ffffff",
        color: "#1a3c34",
        confirmButtonColor: "#2d6a4f"
    }).then((r) => { if (r.isConfirmed) { window.open(CONFIG.poolLink, "_blank"); } });
}

function setDuration(days, apr, el) {
    currentDays = days;
    currentAPR = apr;
    document.getElementById("display-apr").innerText = (apr * 100) + "%";
    document.getElementById("calc-days").innerText = days;
    document.querySelectorAll(".duration-btn").forEach(btn => btn.classList.remove("active"));
    el.classList.add("active");
    calculateReward();
}

function calculateReward() {
    const amount = parseFloat(document.getElementById("stake-input").value || 0);
    const box = document.getElementById("reward-display");
    const level = document.getElementById("gorilla-level");
    if (amount <= 0) {
        box.classList.add("hidden");
        level.innerText = "BABY APE";
        return;
    }
    box.classList.remove("hidden");
    const daily = (amount * currentAPR) / 365;
    const total = daily * currentDays;
    document.getElementById("daily-reward").innerText = daily.toLocaleString(undefined, { maximumFractionDigits: 2 });
    document.getElementById("period-reward").innerText = total.toLocaleString(undefined, { maximumFractionDigits: 2 });
    document.getElementById("live-rewards").innerText = total.toLocaleString(undefined, { maximumFractionDigits: 2 });
    
    if (amount >= 1000000) level.innerText = "GOLDEN KONG";
    else if (amount >= 100000) level.innerText = "SILVERBACK";
    else level.innerText = "BABY APE";
}

function maxAmount() {
    document.getElementById("stake-input").value = userBalance;
    calculateReward();
}

// Banana Rain (Ultra Slow)
function createBanana() {
    const banana = document.createElement('div');
    banana.classList.add('banana');
    banana.innerText = '🍌';
    banana.style.left = Math.random() * 100 + 'vw';
    const duration = Math.random() * 20 + 20; 
    banana.style.animationDuration = duration + 's';
    document.body.appendChild(banana);
    setTimeout(() => { banana.remove(); }, duration * 1000);
}
setInterval(createBanana, 5000);

fetchBlockchainStats();
setInterval(fetchBlockchainStats, 60000);
setInterval(fetchUserBalance, 15000);
</script>
</body>
</html>
