<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BANANAAPE | The Jungle Economy</title>
<meta name="description" content="This is not a token. This is a jungle economy.">

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {background:#0a0a0b;color:#fff;font-family:Inter,sans-serif;}
.hero {background: radial-gradient(circle,#ffe60020 0%,#0a0a0b 80%);}
.gold {
background:linear-gradient(to right,#ffe600,#ffae00);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
font-weight:800;
}
.glass {
background:rgba(255,255,255,.04);
backdrop-filter:blur(12px);
border:1px solid rgba(255,255,255,.08);
border-radius:16px;
}
.swap-box {max-width:420px;margin:auto;padding:18px;border-radius:20px;background:#111;}
input{background:none;border:none;color:#fff;outline:none;}
button{transition:.3s;}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero min-h-screen flex flex-col justify-center items-center text-center px-6">

<img src="G.PNG" class="w-40 md:w-56 rounded-full border-4 border-yellow-400/40 mb-6">

<h1 class="text-4xl md:text-6xl font-bold mb-6">
THIS IS NOT A TOKEN<br>
<span class="gold">THIS IS A JUNGLE</span>
</h1>

<p class="text-gray-400 mb-6">
Apes farm. Apes win. 🍌
</p>

<div class="flex flex-col gap-3 w-full max-w-xs">
<button onclick="copyCA()" class="glass px-6 py-3 rounded-xl">Copy CA</button>
<a href="farm.html" class="px-6 py-3 bg-yellow-500 text-black rounded-xl font-bold">ENTER FARM</a>
</div>

</section>

<!-- STATS -->
<section class="py-16 px-6 text-center">

<h2 class="gold text-2xl mb-10">JUNGLE STATS</h2>

<div class="grid grid-cols-2 md:grid-cols-4 gap-4 max-w-4xl mx-auto">

<div class="glass p-4">
<p class="text-xs text-gray-400">TVL</p>
<p id="tvl">--</p>
</div>

<div class="glass p-4">
<p class="text-xs text-gray-400">APR</p>
<p id="apr">--</p>
</div>

<div class="glass p-4">
<p class="text-xs text-gray-400">Users</p>
<p id="users">--</p>
</div>

<div class="glass p-4">
<p class="text-xs text-gray-400">Activity</p>
<p id="activity">--</p>
</div>

</div>

</section>

<!-- SWAP -->
<section class="py-16 text-center">
<h2 class="gold text-2xl mb-6">SWAP</h2>

<div class="swap-box">

<input id="amount" placeholder="Amount SOL" class="mb-4 w-full text-lg">

<input id="out" placeholder="Estimate" disabled class="mb-4 w-full text-lg">

<button onclick="getQuote()" class="bg-yellow-500 text-black w-full py-2 rounded">Quote</button>

<button onclick="swap()" class="mt-2 bg-green-500 w-full py-2 rounded">Swap</button>

<p id="status" class="text-xs mt-2"></p>

</div>

</section>

<!-- LIVE TX -->
<section class="py-16 px-6 text-center">
<h2 class="gold text-2xl mb-6">LIVE ACTIVITY</h2>
<div id="txFeed" class="max-w-md mx-auto space-y-2 text-left"></div>
</section>

<!-- CHART -->
<section class="py-16 text-center px-6">
<h2 class="gold text-2xl mb-6">CHART</h2>
<iframe id="chart" style="width:100%;max-width:900px;height:420px;border:none;"></iframe>
</section>

<footer class="py-10 text-center text-gray-600 text-xs">
BANANAAPE © 2026
</footer>

<script type="module">

import { Connection, Transaction } from "https://esm.sh/@solana/web3.js";

const CA = "ISI_CA_KAMU";
const API_STATS = "ISI_API_STATS_KAMU";
const API_TX = "ISI_API_TX_KAMU";

const connection = new Connection("https://api.mainnet-beta.solana.com");

document.getElementById("chart").src =
`https://dexscreener.com/solana/${CA}?embed=1&theme=dark`;

/* COPY */
function copyCA(){
navigator.clipboard.writeText(CA);
alert("Copied");
}

/* STATS */
async function loadStats(){
try{
const res = await fetch(API_STATS);
const d = await res.json();

document.getElementById("tvl").innerText = "$"+d.tvl;
document.getElementById("apr").innerText = d.apr+"%";
document.getElementById("users").innerText = d.users;
document.getElementById("activity").innerText = d.lastActivity;
}catch{
document.getElementById("activity").innerText="loading...";
}
}
setInterval(loadStats,15000); loadStats();

/* TX FEED */
async function loadTx(){
try{
const res = await fetch(API_TX);
const data = await res.json();

const el = document.getElementById("txFeed");
el.innerHTML="";

data.forEach(tx=>{
let div=document.createElement("div");
div.className="glass p-2 flex justify-between";

let t=new Date(tx.time*1000).toLocaleTimeString();

div.innerHTML=`<span class="text-green-400">+${tx.amount} SOL</span><span class="text-xs">${t}</span>`;
el.appendChild(div);
});
}catch{}
}
setInterval(loadTx,10000); loadTx();

/* SWAP */
let route;

async function getQuote(){
let amt=parseFloat(document.getElementById("amount").value);
if(!amt) return;

const lamports = Math.floor(amt*1e9);

const res = await fetch(`https://quote-api.jup.ag/v6/quote?inputMint=So11111111111111111111111111111111111111112&outputMint=${CA}&amount=${lamports}`);
const data = await res.json();

route=data.data[0];

document.getElementById("out").value=(route.outAmount/1e6).toFixed(2);
}

async function swap(){
document.getElementById("status").innerText="Coming soon connect wallet...";
}

window.copyCA=copyCA;
window.getQuote=getQuote;
window.swap=swap;

</script>

</body>
</html>
