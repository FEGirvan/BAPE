body {

.hero-gradient {

.gold-text {
background: linear-gradient(to bottom, #fde047, #eab308);

-webkit-text-fill-color: transparent;

filter: drop-shadow(0 2px 2px rgba(0,0,0,0.1));

/* Tombol Lebih Bulat (Bubbly) */

color: #854d0e;
border-bottom: 5px solid #ca8a04;

.ape-glow {
