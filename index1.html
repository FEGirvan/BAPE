<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BANANAAPE | PRO SWAP</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{background:#0a0a0b;color:#fff;font-family:Inter,sans-serif;}
.glass{background:rgba(255,255,255,.05);backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.1);border-radius:18px;}
.gold{background:linear-gradient(to right,#ffe600,#ffae00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:900;}
input{background:transparent;outline:none;width:100%;}
button:disabled{opacity:.5;cursor:not-allowed;}
.spinner{border:2px solid #333;border-top:2px solid #ffe600;border-radius:50%;width:16px;height:16px;animation:spin 1s linear infinite;}
@keyframes spin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}
</style>
</head>

<body class="flex items-center justify-center min-h-screen">

<div class="glass p-6 w-full max-w-md">

<h2 class="text-xl gold mb-4 text-center">FEED THE APE</h2>

<!-- WALLET -->
<div class="flex justify-between items-center mb-4">
<button onclick="connectWallet()" id="walletBtn" class="bg-yellow-500 text-black px-3 py-1 rounded-lg text-sm font-bold">Connect</button>
<span id="balance" class="text-xs text-gray-400">Balance: --</span>
</div>

<!-- INPUT -->
<div class="mb-3">
<p class="text-xs text-gray-400 mb-1">You pay (SOL)</p>
<input id="amount" placeholder="0.0">
</div>

<div class="mb-3">
<p class="text-xs text-gray-400 mb-1">You receive ($BAPE)</p>
<input id="out" disabled>
</div>

<!-- INFO -->
<div class="text-xs text-gray-400 space-y-1 mb-3">
<p>Min Received: <span id="minReceived">--</span></p>
<p>Price Impact: <span id="impact">--</span></p>
</div>

<!-- SLIPPAGE -->
<select id="slippage" class="w-full mb-3 bg-black border p-2 text-sm">
<option value="50">0.5%</option>
<option value="100" selected>1%</option>
<option value="300">3%</option>
</select>

<!-- BUTTONS -->
<button onclick="getQuote()" id="quoteBtn" class="bg-yellow-500 text-black w-full py-2 rounded mb-2">
Get Price
</button>

<button onclick="swap()" id="swapBtn" disabled class="bg-green-500 w-full py-2 rounded flex justify-center items-center gap-2">
<span id="swapText">Swap</span>
</button>

<p id="status" class="text-xs mt-3 text-center"></p>

</div>

<script type="module">

import { Connection, VersionedTransaction } from "https://esm.sh/@solana/web3.js";

const CA = "ISI_CA_KAMU";
const connection = new Connection("https://rpc.helius.xyz/?api-key=API_KEY_KAMU");

let wallet=null;
let route=null;

/* CONNECT */
window.connectWallet = async () => {
if(!window.solana) return alert("Install Phantom");
const res = await window.solana.connect();
wallet = res.publicKey;
walletBtn.innerText = wallet.toString().slice(0,4)+"...";
loadBalance();
};

/* BALANCE */
async function loadBalance(){
const lamports = await connection.getBalance(wallet);
balance.innerText = "Balance: "+(lamports/1e9).toFixed(2)+" SOL";
}

/* QUOTE */
window.getQuote = async () => {
const amt = parseFloat(amount.value);
if(!amt) return;

status.innerHTML='<div class="spinner"></div>';

const lamports = Math.floor(amt * 1e9);

const res = await fetch(`https://quote-api.jup.ag/v6/quote?inputMint=So11111111111111111111111111111111111111112&outputMint=${CA}&amount=${lamports}&slippageBps=${slippage.value}`);
const data = await res.json();

if(!data.data || !data.data.length){
status.innerText="No route";
return;
}

route = data.data[0];

out.value = (route.outAmount/1e6).toFixed(2);

minReceived.innerText = (route.otherAmountThreshold/1e6).toFixed(2);
impact.innerText = (route.priceImpactPct*100).toFixed(2)+"%";

swapBtn.disabled=false;
status.innerText="";
};

/* SWAP */
window.swap = async () => {
if(!wallet) return alert("Connect wallet");

swapBtn.disabled=true;
swapText.innerHTML='<div class="spinner"></div>';

try{

const swapRes = await fetch("https://quote-api.jup.ag/v6/swap",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
route,
userPublicKey:wallet.toString(),
wrapAndUnwrapSol:true
})
});

const swapData = await swapRes.json();

const tx = VersionedTransaction.deserialize(
Uint8Array.from(atob(swapData.swapTransaction),c=>c.charCodeAt(0))
);

const signed = await window.solana.signTransaction(tx);

const sig = await connection.sendRawTransaction(signed.serialize());

status.innerHTML=`✅ <a href="https://solscan.io/tx/${sig}" target="_blank" class="text-green-400">View TX</a>`;

}catch(e){
console.error(e);
status.innerText="Swap failed";
}

swapBtn.disabled=false;
swapText.innerText="Swap";

};

</script>

</body>
</html>
