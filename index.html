<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BANANAAPE | Hyper Meme Empire</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://terminal.jup.ag/main-v4.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
body{background:#0a0a0b;color:#fff;font-family:Inter,sans-serif;overflow-x:hidden;}
.glass-morphism{background:rgba(255,255,255,0.03);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.1);border-radius:15px;}
.gold-text{background:linear-gradient(to right,#fde047,#ca8a04);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.btn-primary{background:linear-gradient(90deg,#ffe600,#ffae00);color:#000;}
.banana{position:fixed;top:-100px;opacity:.3;animation:fall linear infinite;z-index:-1;}
@keyframes fall{0%{transform:translateY(0)}100%{transform:translateY(110vh)}}
</style>
</head>

<body>

<!-- FOMO FLOAT -->
<div id="fomo-feed" class="fixed bottom-6 left-6 z-[80] space-y-2"></div>

<!-- HERO -->
<section id="about" class="min-h-screen flex flex-col items-center justify-center text-center px-6">

<h1 id="hero-title" class="text-4xl md:text-7xl font-bold mb-6">
WE BUILT NOTHING <br>
<span class="gold-text">AND IT WORKED</span>
</h1>

<p class="text-gray-400 max-w-md mb-6">
No roadmap. No utility. Just chaos energy.
</p>

<button onclick="copyCA()" class="btn-primary px-6 py-3 rounded-xl font-bold mb-6">
COPY CONTRACT
</button>

<!-- MEME SCORE -->
<div class="glass-morphism p-6 border border-yellow-500/20 max-w-md">
<h3 class="text-yellow-400 text-xs mb-4 uppercase">Meme Engine Score</h3>

<div class="space-y-2 text-xs">
<div class="flex justify-between"><span>Meme Quality</span><span>10/10</span></div>
<div class="flex justify-between"><span>Viral Potential</span><span>10/10</span></div>
<div class="flex justify-between"><span>FOMO Trigger</span><span>10/10</span></div>
<div class="flex justify-between"><span>Launch Radius</span><span>10/10</span></div>
</div>
</div>

<!-- PROGRESS -->
<div class="mt-6 w-full max-w-md">
<div class="w-full bg-white/10 h-2 rounded-full">
<div id="fomo-bar" class="h-full bg-yellow-400"></div>
</div>
</div>

</section>

<!-- CHART -->
<section class="py-12 px-6">
<iframe id="dex-iframe" style="width:100%;height:500px;border:none;"></iframe>
</section>

<!-- FARM (STREAMFLOW SAFE) -->
<section class="py-12 text-center">
<h2>Banana Staking (Streamflow)</h2>
<p>All staking powered by Streamflow Protocol</p>
</section>

<!-- SWAP (JUPITER SAFE) -->
<section class="py-12 text-center">
<h2>Swap $BAPE</h2>
<div id="integrated-terminal" style="max-width:400px;margin:auto;"></div>
</section>

<script>

/* CA */
const CA_KITA="AkgVdEH24cWSdzTf735SWESjsz4Y13m1u6AZcEmfpump";

/* UPDATE LINKS */
document.getElementById("dex-iframe").src=
`https://dexscreener.com/solana/${CA_KITA}?embed=1&theme=dark`;

/* COPY */
function copyCA(){
navigator.clipboard.writeText(CA_KITA);
alert("Copied!");
}

/* JUPITER */
document.addEventListener("DOMContentLoaded",()=>{
setTimeout(()=>{
if(window.Jupiter){
window.Jupiter.init({
displayMode:"integrated",
integratedTargetId:"integrated-terminal",
formProps:{initialOutputMint:CA_KITA}
});
}
},1500);
});

/* FOMO FEED */
const msgs=[
"0xA91 just aped 🚀",
"0xFF2 bought in 🍌",
"0x777 entered early",
"Smart wallet detected",
"New buyer joined"
];

setInterval(()=>{
const el=document.createElement("div");
el.className="glass-morphism px-3 py-2 text-xs";
el.innerText=msgs[Math.floor(Math.random()*msgs.length)];
document.getElementById("fomo-feed").appendChild(el);
setTimeout(()=>el.remove(),5000);
},3000);

/* PROGRESS BAR */
let p=0;
setInterval(()=>{
p+=Math.random()*10;
if(p>100)p=0;
document.getElementById("fomo-bar").style.width=p+"%";
},800);

/* HERO ROTATION */
const texts=[
"WE BUILT NOTHING",
"NO PLAN JUST APES",
"THIS SHOULD NOT WORK",
"BUT IT IS WORKING",
"YOU ARE EARLY"
];
let i=0;
setInterval(()=>{
i=(i+1)%texts.length;
document.getElementById("hero-title").innerHTML=
texts[i]+"<br><span class='gold-text'>AND IT WORKED</span>";
},4000);

/* BANANA RAIN */
function banana(){
const b=document.createElement("div");
b.className="banana";
b.innerText="🍌";
b.style.left=Math.random()*100+"vw";
b.style.animationDuration=(Math.random()*40+40)+"s";
document.body.appendChild(b);
setTimeout(()=>b.remove(),60000);
}
setInterval(banana,5000);

</script>

</body>
</html>
